services:
  bot:
    build: .
    image: market-autodelivery:latest
    container_name: market-autodelivery
    restart: unless-stopped
    # Используем дефолтную сеть bridge: пользовательская сеть compose на этом
    # хосте теряет исходящую связность (DNS резолвится, но пакеты не NAT-ятся
    # наружу). Дефолтный bridge работает корректно.
    network_mode: bridge
    # Запускаем под uid/gid владельца смонтированного каталога data/ на хосте
    # (uid 1000). Иначе контейнерный пользователь appuser (uid 10001) не имеет
    # прав на запись в ./data → SQLite падает с "readonly database".
    user: "1000:1000"
    # Конфигурация и секреты берутся из .env (не коммитится в репозиторий)
    env_file:
      - .env
    environment:
      # БД внутри контейнера лежит в /app/data — он смонтирован томом ниже,
      # поэтому база переживает пересборку/перезапуск контейнера.
      DATABASE_URL: sqlite+aiosqlite:////app/data/service.db
    volumes:
      - ./data:/app/data
    # Логи в stdout — смотреть через `docker compose logs -f`
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
